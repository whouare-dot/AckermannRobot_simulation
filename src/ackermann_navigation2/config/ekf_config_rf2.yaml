        # -------------------------------------
        # 配置 3: 雷达里程计 (odom1) - 仅作为位置修正
        # -------------------------------------
        odom1: /odom_rf2o
        odom1_config: [true,  true,  false, # 融合 X, Y 位置
                    false, false, false, # 关闭 Yaw，防止与 IMU 冲突导致跳变
                    false, false, false,
                    false, false, false,
                    false, false, false]
        odom1_differential: true  # 必须开启，只融合雷达提供的位移增量
        odom1_relative: true