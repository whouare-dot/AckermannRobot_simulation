### ekf config file for ackermann_robot ###
ekf_filter_node:
    ros__parameters:
        frequency: 30.0
        sensor_timeout: 0.1
        two_d_mode: true
        transform_time_offset: 0.0
        transform_timeout: 0.0
        print_diagnostics: true
        debug: false
        publish_tf: true
        publish_acceleration: false

        map_frame: map
        odom_frame: odom
        base_link_frame: base_link
        world_frame: odom

        # -------------------------------------
        # 配置 1: 轮式里程计 (来自 gazebo_control.xacro)
        # -------------------------------------
        odom0: /odom_wheel
        odom0_config: [false, false, false,
                       false, false, false,
                       true,  false, false,
                       false, false, true,
                       false, false, false]
        # 说明：对于阿克曼底盘，通常只信赖 X轴速度(vx) 和 角速度(vyaw)。
        # 如果你的里程计包含位置信息(x,y)，可以将前两个false改为true，但通常融合速度更稳定。
        
        odom0_queue_size: 10
        odom0_nodelay: false
        odom0_differential: false
        odom0_relative: false

        # -------------------------------------
        # 配置 2: IMU (来自 sensors.xacro)
        # -------------------------------------
        imu0: /imu/data
        # 你的 sensors.xacro 中重映射为了 /imu/data 
        
        # IMU 配置矩阵:
        # x, y, z, roll, pitch, yaw, 
        # vx, vy, vz, vroll, vpitch, vyaw, 
        # ax, ay, az
        imu0_config: [false, false, false,
                      false, false, true,
                      false, false, false,
                      false, false, true,
                      true,  false, false]
        # 说明：使用 偏航角(yaw), 偏航角速度(vyaw) 和 X轴加速度(ax)
        
        imu0_nodelay: false
        imu0_differential: false
        imu0_relative: true 
        # relative=true 很重要，这意味着以启动时的朝向为0，防止磁力计干扰导致的绝对朝向错误
        
        imu0_queue_size: 10
        imu0_remove_gravitational_acceleration: true

